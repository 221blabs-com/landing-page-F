<!DOCTYPE html>
<html>
<head>
    <!-- author="surakarapu shanmukh srinivas" -->
    <title>221B Labs</title>

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="favicon.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,body{
            width:100%;
            height:100%;
            overflow:hidden;
            background:black;
        }

        iframe{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            border:none;
        }

        /* Right strip to hide scrollbar */
        .right-strip{
            position:fixed;
            top:0;
            right:0;
            width:18px;
            height:100%;
            background:white;
            z-index:999999;
            pointer-events:none;
        }

        /* Floating timer covering the Framer badge */
        .framer-cover{
            position:fixed;
            bottom:10px;
            right:34px;

            width:160px;
            height:55px;

            background:white;
            border-radius:28px;

            display:flex;
            justify-content:center;
            align-items:center;

            /* font-family:Arial, Helvetica, sans-serif;
            font-size:18px;
            font-weight:600;
            color:#000; */

            font-family: "DotGothic16", monospace;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #222;

            box-shadow:0 8px 20px rgba(0,0,0,0.2);

            z-index:999999;

            pointer-events:auto;
            cursor:default;
            user-select:none;
        }
    </style>
</head>

<body>

    <iframe src="https://221blabst2.framer.website/"></iframe>

    <div class="right-strip"></div>

    <div class="framer-cover">
        <span id="visitTimer">00:00</span>
    </div>

    <script>
        const startTime = Date.now();

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);

            // const hours = String(Math.floor(elapsed / 3600)).padStart(2, "0");
            const minutes = String(Math.floor((elapsed % 3600) / 60)).padStart(2, "0");
            const seconds = String(elapsed % 60).padStart(2, "0");

            document.getElementById("visitTimer").textContent =
                //`${hours}:${minutes}:${seconds}`;
                `${minutes}:${seconds}`;
        }

        updateTimer();
        setInterval(updateTimer, 1000);
    </script>

</body>
</html>

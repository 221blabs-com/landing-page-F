<!DOCTYPE html>
<html>
<head>
    <!-- author="surakarapu shanmukh srinivas" -->
    <title>221B Labs</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="favicon.jpeg">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,body{
            width:100%;
            height:100%;
            overflow:hidden;
            background:black;
        }

        iframe{
            position:fixed;
            top:0;
            left:0;

            width:100%;
            height:100%;

            border:none;
        }

        /* Bottom strip to hide Framer badge */
        .bottom-strip{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            height:60px; /* increase if needed */
            background:black;
            z-index:999999;

            pointer-events:none;
            user-select:none;
        }

        /* Right strip to hide scrollbar */
        .right-strip{
            position:fixed;
            top:0;
            right:0;

            width:18px; /* adjust if needed */
            height:100%;

            background:black;

            z-index:999999;
            pointer-events:none;
        }

    </style>
</head>

<body>

    <iframe src="https://221blabs.framer.website"></iframe>

    <div class="bottom-strip"></div>

    <div class="right-strip"></div>

</body>
</html>

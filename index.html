<!DOCTYPE html>
<html>
<head>
    <!-- author="surakarapu shanmukh srinivas" -->
    <title>221B Labs</title>

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="favicon.jpeg">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,body{
            width:100%;
            height:100%;
            overflow:hidden;
            background:black;
        }

        iframe{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            border:none;
        }

        /* Right strip to hide scrollbar */
        .right-strip{
            position:fixed;
            top:0;
            right:0;
            width:18px;
            height:100%;
            background:rgb(255, 255, 255);
            z-index:999999;
            pointer-events:none;
        }

        /* White box covering only the Made in Framer badge */
        .framer-cover{
    position:fixed;
    bottom:10px;
    right:20px;

    width:130px;
    height:40px;

    background:white;
    z-index:999999;

    pointer-events:auto;   /* Blocks clicks */
    cursor:default;
}

    </style>
</head>

<body>

    <iframe src="https://221blabst2.framer.website/"></iframe>

    <div class="right-strip"></div>

    <div class="framer-cover"></div>

</body>
</html>
